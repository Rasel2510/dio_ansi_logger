name: dio_ansi_logger
description: >-
  A beautiful, Postman-style Dio interceptor that logs HTTP requests and
  responses with ANSI colors, structured formatting, and customizable themes.
version: 1.0.3
homepage: https://github.com/Rasel2510/dio_ansi_logger
repository: https://github.com/Rasel2510/dio_ansi_logger
issue_tracker: https://github.com/Rasel2510/dio_ansi_logger/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dio: ">=5.4.0 <6.0.0"

dev_dependencies:
  lints: ">=3.0.0"
  test: ">=1.24.0"

topics:
  - dio
  - networking
  - logging
  - http
  - debug
